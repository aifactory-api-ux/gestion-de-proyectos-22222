version: '3.8'

services:
  db:
    image: postgres:15-alpine

    environment:
      POSTGRES_DB: gestion_proyectos
      POSTGRES_USER: gp_admin
      POSTGRES_PASSWORD: supersecret
    ports:
      - "15443:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gp_admin -d gestion_proyectos"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend
      dockerfile: ./auth-service/Dockerfile

    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: gestion_proyectos
      POSTGRES_USER: gp_admin
      POSTGRES_PASSWORD: supersecret
      AUTH_JWT_SECRET: change_this_secret_in_production
      AUTH_JWT_EXPIRE_MINUTES: 60
    ports:
      - "18011:8001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  project-service:
    build:
      context: ./backend
      dockerfile: ./project-service/Dockerfile

    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: gestion_proyectos
      POSTGRES_USER: gp_admin
      POSTGRES_PASSWORD: supersecret
      AUTH_JWT_SECRET: change_this_secret_in_production
      AUTH_JWT_EXPIRE_MINUTES: 60
    ports:
      - "18012:8002"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./backend
      dockerfile: ./notification-service/Dockerfile

    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: gestion_proyectos
      POSTGRES_USER: gp_admin
      POSTGRES_PASSWORD: supersecret
      AUTH_JWT_SECRET: change_this_secret_in_production
      AUTH_JWT_EXPIRE_MINUTES: 60
    ports:
      - "18013:8003"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  chat-service:
    build:
      context: ./backend
      dockerfile: ./chat-service/Dockerfile

    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: gestion_proyectos
      POSTGRES_USER: gp_admin
      POSTGRES_PASSWORD: supersecret
      AUTH_JWT_SECRET: change_this_secret_in_production
      AUTH_JWT_EXPIRE_MINUTES: 60
    ports:
      - "18014:8004"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    environment:
      VITE_API_BASE_URL: http://localhost:18011
      VITE_PROJECT_API_URL: http://localhost:18012
      VITE_NOTIFICATION_API_URL: http://localhost:18013
      VITE_CHAT_API_URL: http://localhost:18014
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - project-service
      - notification-service
      - chat-service

volumes:
  postgres_data: